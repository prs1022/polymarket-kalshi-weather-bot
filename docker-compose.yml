services:
  bot:
    build: .
    container_name: trading-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/tradingbot.db
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist logs
      - ./.run/logs:/app/.run/logs
      # Mount Kalshi RSA key if you use Kalshi (uncomment and set path)
      # - ./kalshi-key.pem:/app/kalshi-key.pem:ro
    restart: unless-stopped
